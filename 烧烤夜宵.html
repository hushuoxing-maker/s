<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>烧烤夜宵门头生成器 · 商业增强版 V3</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  padding:40px;
}

h2{
  margin-bottom:20px;
}

/* 输入区 */
input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-bottom:15px;
}

button{
  padding:12px 20px;
  background:linear-gradient(90deg,#ff3c00,#ff8a00);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* 卡片 */
.item{
  display:flex;
  align-items:stretch;
  background:#1c1c1c;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(255,60,0,0.2);
  overflow:hidden;
}

/* 左侧内容 90% */
.text{
  flex:9;
  padding:14px;
  line-height:1.6;
  font-size:14px;
  white-space:pre-wrap;
}

/* 右侧按钮 10% */
.action{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#151515;
  border-left:1px solid rgba(255,60,0,0.2);
}

/* 复制按钮 */
.copy-btn{
  width:28px;
  height:28px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#ff3c00,#ff8a00);
  color:#fff;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.copy-btn:hover{
  transform:scale(1.1);
}

.copy-btn:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<h2>🔥 烧烤夜宵门头AI · 商业结构增强版 V3</h2>

<input id="input" placeholder="输入：店名 + 品类 + 风格（如：老王烧烤 夜宵 烟火气）">
<button onclick="go()">生成20组商业门头提示词</button>

<div id="box"></div>

<script>

/* =========================
   商业系统库
========================= */

const system = {
  场景:[
    "夜市核心流量区",
    "社区深夜消费区",
    "商业街黄金铺位",
    "大学夜宵聚集区",
    "网红打卡街区"
  ],

  风格:[
    "烟火气爆棚",
    "深夜食堂氛围",
    "夜市霸主气场",
    "年轻社交聚集地",
    "城市夜经济核心"
  ],

  材质:[
    "通体发光大字",
    "亚克力灯箱",
    "金属烤漆边框",
    "LED霓虹灯管",
    "吸塑立体发光字"
  ],

  灯光:[
    "暖橙炭火光",
    "高亮对比夜光",
    "局部重点打光",
    "柔光漫射系统",
    "霓虹氛围灯光"
  ],

  色彩:[
    "红橙高食欲配色",
    "黑红强对比冲击",
    "橙黄渐变炭火感",
    "暖黄夜宵氛围",
    "深色底+亮色字"
  ],

  爆款:[
    "深夜不打烊",
    "越夜越火爆",
    "排队王门店",
    "夜宵界天花板",
    "一口上瘾",
    "凌晨三点还爆满",
    "本地人必吃",
    "烧烤界顶流"
  ]
}

/* =========================
   工具函数
========================= */

function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

/* =========================
   生成逻辑
========================= */

function build(name, i){

  return `
【商业烧烤夜宵门头设计】

品牌：${name}
场景：${r(system.场景)}

风格：${r(system.风格)}

材质：${r(system.材质)}

灯光：${r(system.灯光)}

色彩：${r(system.色彩)}

传播语：${r(system.爆款)}

核心要求：
5秒远距离识别 / 3秒记住品牌 / 1秒产生食欲

结构要求：
正面商业街门头真实场景，
可施工落地结构设计，
夜间高亮识别系统，
提升进店转化率`
}

/* =========================
   去重生成
========================= */

function gen20(name){

  let set = new Map()

  while(set.size < 20){
    let t = build(name)
    set.set(t, t)
  }

  return [...set.values()]
}

/* =========================
   渲染
========================= */

function go(){

  let val = document.getElementById("input").value.trim()
  if(!val){
    alert("请输入内容")
    return
  }

  window.DATA = gen20(val)

  let html = ""

  window.DATA.forEach((t,i)=>{
    html += `
    <div class="item">
      <div class="text">${i+1}. ${t}</div>
      <div class="action">
        <button class="copy-btn" onclick="copy(${i},this)">⧉</button>
      </div>
    </div>
    `
  })

  document.getElementById("box").innerHTML = html
}

/* =========================
   复制功能
========================= */

function copy(index,btn){

  navigator.clipboard.writeText(window.DATA[index])

  btn.innerHTML = "✓"
  btn.style.background = "#555"

  setTimeout(()=>{
    btn.innerHTML = "⧉"
    btn.style.background = "linear-gradient(135deg,#ff3c00,#ff8a00)"
  },800)
}

</script>

</body>
</html>
