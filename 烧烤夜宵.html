<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>烧烤夜宵门头生成器 · 无重复高级版</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:#111;
  color:#fff;
  padding:40px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}

button{
  padding:12px 20px;
  background:#ff3c00;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.item{
  background:#1c1c1c;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 无重复烧烤门头提示词生成器</h2>

<input id="input" placeholder="输入：店名+品类+风格">
<button onclick="go()">生成20组</button>

<div id="box"></div>

<script>

// 各模块库
const 风格 = ["烟火气爆棚","夜市感十足","城市夜经济核心","年轻人聚集地","深夜食堂氛围","强社交属性","夜宵王者气场"]
const 材质 = ["大字发光字","灯泡字","亚克力发光字","吸塑灯箱","霓虹灯","铁艺灯牌"]
const 灯光 = ["暖橙色灯光","高亮对比光","炭火氛围光","局部打光","泛光照明"]
const 色彩 = ["红橙撞色","黑红高对比","暖黄主调","橙色渐变","深色底+高亮字"]
const 字体 = ["粗体手写","力量字体","街头风字体","厚重字体","醒目大字"]
const 广告语 = [
"深夜不打烊","越晚越火爆","烧烤界顶流","排队王","人间烟火天花板",
"凌晨三点还爆满","兄弟聚会首选","一口上瘾","本地人都来吃","夜宵界王者"
]

const 结构 = [
["风格","需求","材质","灯光","色彩","字体","广告语"],
["需求","风格","灯光","材质","字体","广告语","色彩"],
["风格","材质","需求","色彩","灯光","广告语","字体"],
["需求","材质","风格","字体","灯光","色彩","广告语"]
]

// 随机取
function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

// 生成一条（结构也随机）
function 生成单条(需求){
  let map = {
    风格:r(风格),
    材质:r(材质),
    灯光:r(灯光),
    色彩:r(色彩),
    字体:r(字体),
    广告语:"广告语「"+r(广告语)+"」",
    需求:需求
  }

  let s = r(结构)

  let result = s.map(k=>map[k]).join("，")

  return result + "，门头正立面效果完全展示"
}

// 去重
function 生成20组(需求){
  let set = new Set()

  while(set.size < 20){
    set.add(生成单条(需求))
  }

  return [...set]
}

function go(){
  let val = document.getElementById("input").value.trim()
  if(!val){
    alert("请输入内容")
    return
  }

  let list = 生成20组(val)

  let html = ""
  list.forEach((t,i)=>{
    html += `<div class="item">${i+1}. ${t}</div>`
  })

  document.getElementById("box").innerHTML = html
}

</script>

</body>
</html>
